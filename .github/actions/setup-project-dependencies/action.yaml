name: Setup Project Dependencies
description: Checkout repository, install pnpm and setup node
inputs:
  bubblewrap-sandbox:
    description: Install bubblewrap and enable unprivileged user namespaces for test/bench jobs that exercise the virrun os backend
    required: false
    default: false
  node-version-file:
    description: Path to file containing node version
    required: false
    default: package.json
  node-version:
    description: Explicit node version; overrides node-version-file when set
    required: false
    default: ""
runs:
  using: composite
  steps:
    # Set up Node *before* pnpm. pnpm/action-setup picks its install strategy from the runner's *system* Node:
    # `standalone = systemNode.major < 22 || (major === 22 && minor < 13)`. When the system Node is too old it
    # falls back to the @pnpm/exe standalone bootstrap, whose self-installer crashes
    # (`ERR_INVALID_ARG_TYPE: paths[0] ... undefined`) — this is what breaks the bench job on the bare-metal
    # `codspeed-macro` runners (system Node 18.20.4). Installing a modern Node up front keeps action-setup on the
    # plain `pnpm` install path. No pnpm cache here yet — pnpm isn't installed, so `cache: pnpm` can't resolve.
    - name: 🛠️ Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        # setup-node warns if both are set, so fall back to the file only when no explicit version is given.
        node-version-file: ${{ inputs.node-version == '' && inputs.node-version-file || '' }}

    - name: 📦 Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
    # GitHub's Ubuntu image ships neither bubblewrap nor permissive unprivileged user namespaces, so the
    # virrun os-backend suites would self-gate and silently skip. Test/bench jobs opt into this so the
    # sandbox is available before Vitest collects host-capability checks.
    - name: 📦 Enable bubblewrap sandbox
      if: ${{ fromJSON(inputs.bubblewrap-sandbox) }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y bubblewrap
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
        dir="$(mktemp -d)"
        bwrap --unshare-all --die-with-parent --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp \
          --overlay-src "$dir" --tmp-overlay "$dir" --chdir "$dir" -- true
    # Re-run setup-node now that pnpm exists, solely to wire up the pnpm store cache (Node is already installed,
    # so this pass is effectively just the cache restore/save).
    - name: 🛠️ Setup node (pnpm cache)
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && inputs.node-version-file || '' }}
        cache: pnpm
