name: Setup Packages
description: Install dependencies, then restore built package output (dist + generated barrels) from cache, building only on a cache miss
runs:
  using: composite
  steps:
    - name: 📦 Install dependencies
      run: pnpm i
      shell: bash
    # `packages/*/dist` is the published build output and `packages/*/src/**/index.ts` are the ctix-generated
    # Barrels (gitignored, absent on a fresh checkout). Both are produced by `pnpm build:packages`. The cache key
    # Hashes every input that can change that output — lockfile, catalog, non-app sources (the app has no `src/`,
    # So it is naturally excluded), package manifests and rolldown configs — so app-only commits reuse the build.
    - name: ♻️ Restore package builds
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          packages/*/dist
          packages/*/src/**/index.ts
        key: package-builds-${{ hashFiles('pnpm-lock.yaml', 'pnpm-workspace.yaml', 'packages/*/package.json', 'packages/*/src/**', 'packages/*/rolldown.config.ts') }}

    - name: 🏗️ Build packages
      if: steps.cache.outputs.cache-hit != 'true'
      run: pnpm build:packages
      shell: bash
