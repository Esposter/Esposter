name: 🔥 Claude Warmup

on:
  schedule:
    # Runs every 6 hours (~02:16, 08:16, 14:16, 20:16 UTC) to reset the rolling
    # Claude usage window. The extra hour of gap gives buffer since runs can take a while.
    # ~20:16 UTC (06:16 AEST / UTC+10) stays in the set as the daily anchor.
    # Minute is offset off :00 on purpose — GitHub delays/drops scheduled runs at the
    # "start of every hour" (their words), so a mid-hour minute is materially more reliable.
    - cron: "16 2,8,14,20 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warmup:
    name: Warmup
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 🔥 Warm up Claude Code session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: pnpm dlx @anthropic-ai/claude-code -p "hi"
