name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 🏗️ Build
        run: pnpm build

      - name: 🔍 Lint
        run: pnpm lint

      - name: 📝 Format
        run: pnpm format:check

      - name: ✅ Typecheck
        run: pnpm typecheck

      - name: 🧪 Test
        run: pnpm coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/app/coverage
          if-no-files-found: error
