name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build app
        run: pnpm build:app

  coverage:
    name: Coverage
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
      # `--shard=i/4` runs a distinct quarter of ALL test files (every package + scripts, via the root
      # Vitest `projects` config) on this runner; `--reporter=blob` serialises this shard's results and
      # Coverage data (vitest writes the per-shard `.vitest-reports/blob-i-4.json`) for the merge job.
      - name: 🧪 Test
        run: pnpm exec vitest run --coverage --reporter=blob --shard=${{ matrix.shard }}/4

      - name: 📤 Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-blob-${{ matrix.shard }}
          path: .vitest-reports/*
          if-no-files-found: error
          include-hidden-files: true

  coverage-merge:
    name: Merge Coverage
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 📥 Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .vitest-reports
          pattern: coverage-blob-*
          merge-multiple: true
      # Recombine the sharded runs into one report with unified coverage from the blob data —
      # This re-emits the report only, it does not re-run any tests.
      - name: 🧪 Merge coverage
        run: pnpm exec vitest run --merge-reports --coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage
          if-no-files-found: error

  build-docs:
    name: Build Documentation
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build documentation
        run: pnpm build:docs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🔍 Lint
        run: pnpm lint

  format:
    name: Format
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📝 Format
        run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: ✅ Typecheck
        run: pnpm typecheck
