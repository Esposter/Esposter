name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  build-packages:
    name: Build Packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 🏗️ Build packages
        run: pnpm build:packages

      - name: 📤 Upload package builds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-builds
          path: packages/*/dist
          if-no-files-found: error

  build:
    name: Build App
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package builds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-builds
          path: packages

      - name: 🏗️ Build docs
        run: pnpm build:docs

      - name: 🏗️ Build app
        run: pnpm build:app

  lint:
    name: Lint
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package builds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-builds
          path: packages

      - name: 🔍 Lint
        run: pnpm lint

  format:
    name: Format
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📝 Format
        run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package builds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-builds
          path: packages

      - name: ✅ Typecheck
        run: pnpm typecheck

  coverage:
    name: Coverage
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package builds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-builds
          path: packages

      - name: 🧪 Test
        run: pnpm coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: packages/app/coverage
          if-no-files-found: error
