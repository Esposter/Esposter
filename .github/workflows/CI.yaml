name: 🏗️ CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build every non-app package once and publish the `package-builds` artifact. Extracted into a reusable
  # workflow so 🏗️ CI and 🏎️ Bench share one definition + one content-hash cache key (a build from either
  # workflow warms the cache for the other). The job id stays `build-packages`, so every `needs: build-packages`
  # below is unchanged.
  build-packages:
    uses: ./.github/workflows/build-packages.yaml
  # Capture virrun's warm post-install snapshot once and publish it as a lockfile-hash-keyed `actions/cache`
  # Entry, so the os-backend jobs (format/lint/typecheck) fork it instead of each cold-installing their own.
  # Mirrors build-packages: single gated work, fanned out via `needs:` + a read-only cache restore per consumer.
  warm-snapshot:
    needs: build-packages
    uses: ./.github/workflows/warm-snapshot.yaml

  build:
    name: Build App
    needs: [build-packages, warm-snapshot]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `pnpm build:app` routes the Nuxt build through `virrun --`; bubblewrap makes it run in the os sandbox the
      # Config pins (the build output is flushed to host via write-back) rather than falling back to native.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true
      # install: false — node_modules comes from the warm snapshot inside the sandbox, so a host `pnpm i` is
      # Redundant; Setup Packages exposes the `virrun` bin from the artifact instead.
      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
        with:
          install: false
      # Read-only restore of the warm-snapshot job's published snapshot so `virrun --` forks the warm dep tree.
      - name: ♻️ Restore warm snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.virrun/snapshots
          key: virrun-snapshot-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🏗️ Build app
        run: pnpm build:app

  build-docs:
    name: Build Documentation
    needs: [build-packages, warm-snapshot]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `pnpm build:docs` routes TypeDoc through `virrun --`; bubblewrap makes it run in the os sandbox the config
      # Pins (the generated docs are flushed to host via write-back) rather than falling back to native.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true
      # install: false — node_modules comes from the warm snapshot inside the sandbox, so a host `pnpm i` is
      # Redundant; Setup Packages exposes the `virrun` bin from the artifact instead.
      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
        with:
          install: false
      # Read-only restore of the warm-snapshot job's published snapshot so `virrun --` forks the warm dep tree.
      - name: ♻️ Restore warm snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.virrun/snapshots
          key: virrun-snapshot-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🏗️ Build documentation
        run: pnpm build:docs

  coverage:
    name: Coverage
    needs: build-packages
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # The test suite itself exercises virrun's os backend (createOsBackend tests self-gate on bwrap), so the
      # Sandbox must be installed here — but vitest runs natively below, NOT through virrun. Write-back now
      # Persists produced files, so the old "discarded upper" reason is moot; the real blocker is nesting:
      # Routing coverage through virrun would run the suite *inside* bwrap, and isOsBackendSupported() probes by
      # Spawning a nested bwrap+overlay, which unprivileged userns rejects → the os-backend differential tests
      # Silently skip via describe.skipIf, deleting the correctness gate. Coverage is the one command that must
      # Stay native to keep that gate live.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
      # `--shard=i/8` runs a distinct 1/8th of ALL test files (every package + scripts, via the root
      # Vitest `projects` config) on this runner; `--reporter=blob` serialises this shard's results and
      # Coverage data (vitest writes the per-shard `.vitest-reports/blob-i-8.json`) for the merge job.
      # `--reporter=blob` serialises this shard's results + coverage for the merge job. We pair it with
      # `--reporter=default` so failing tests / unhandled errors are also printed to the console — the
      # blob reporter alone writes only the file and prints nothing, hiding why a shard exits non-zero.
      - name: 🧪 Test
        run: pnpm exec vitest run --coverage --reporter=default --reporter=blob --shard=${{ matrix.shard }}/8

      - name: 📤 Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-blob-${{ matrix.shard }}
          path: .vitest-reports/*
          if-no-files-found: error
          include-hidden-files: true

  coverage-merge:
    name: Merge Coverage
    needs: [build-packages, coverage]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 📥 Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .vitest-reports
          pattern: coverage-blob-*
          merge-multiple: true
      # Recombine the sharded runs into one report with unified coverage from the blob data —
      # This re-emits the report only, it does not re-run any tests. Native (not virrun): a pure merge step has
      # No toolchain to accelerate, and it stays native alongside the coverage shards that feed it.
      - name: 🧪 Merge coverage
        run: pnpm exec vitest run --merge-reports --coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage
          if-no-files-found: error

  format:
    name: Format
    needs: [build-packages, warm-snapshot]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `pnpm format:check` runs `virrun -- oxfmt --check`, so it needs the built virrun bin (Setup Packages
      # Pulls the build-packages artifact) and bubblewrap for the os sandbox the config pins — without bwrap it
      # Would fall back to native instead of running isolated.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true

      # install: false — node_modules comes from the warm snapshot inside the sandbox, so a host `pnpm i` is
      # Redundant; Setup Packages exposes the `virrun` bin from the artifact instead. Only the dist artifact is
      # Needed (typecheck resolves `@esposter/*` to their built `main`).
      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
        with:
          install: false
      # Read-only restore of the snapshot the warm-snapshot job published (it owns the save), so `virrun --` forks
      # The warm dep tree instead of cold-installing. Same lockfile-hash key.
      - name: ♻️ Restore warm snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.virrun/snapshots
          key: virrun-snapshot-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 📝 Format
        run: pnpm format:check

  lint:
    name: Lint
    needs: [build-packages, warm-snapshot]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `pnpm lint` routes oxlint + eslint through `virrun --`; bubblewrap makes that run in the os sandbox
      # The config pins, rather than silently falling back to native.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true

      # install: false — node_modules comes from the warm snapshot inside the sandbox, so a host `pnpm i` is
      # Redundant; Setup Packages exposes the `virrun` bin from the artifact instead. Only the dist artifact is
      # Needed (typecheck resolves `@esposter/*` to their built `main`).
      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
        with:
          install: false
      # Read-only restore of the warm-snapshot job's published snapshot so `virrun --` forks the warm dep tree.
      - name: ♻️ Restore warm snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.virrun/snapshots
          key: virrun-snapshot-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🔍 Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [build-packages, warm-snapshot]
    runs-on: ubuntu-26.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `pnpm typecheck` routes tsgo through `virrun --`; bubblewrap makes that run in the os sandbox
      # The config pins, rather than silently falling back to native.
      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies
        with:
          bubblewrap-sandbox: true

      # install: false — node_modules comes from the warm snapshot inside the sandbox, so a host `pnpm i` is
      # Redundant; Setup Packages exposes the `virrun` bin from the artifact instead. Only the dist artifact is
      # Needed (typecheck resolves `@esposter/*` to their built `main`).
      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
        with:
          install: false
      # Read-only restore of the warm-snapshot job's published snapshot so `virrun --` forks the warm dep tree.
      - name: ♻️ Restore warm snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.virrun/snapshots
          key: virrun-snapshot-${{ hashFiles('pnpm-lock.yaml') }}

      - name: ✅ Typecheck
        run: pnpm typecheck
