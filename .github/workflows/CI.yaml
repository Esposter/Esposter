name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  build-packages:
    name: Build Packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 🏗️ Build packages
        run: pnpm build:packages

      - name: 📦 Pack package workspace
        run: tar --exclude='packages/*/node_modules' --exclude='packages/app/.nuxt' --exclude='packages/app/.output' --exclude='packages/app/coverage' -czf package-workspace.tar.gz packages

      - name: 📤 Upload package workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-workspace
          path: package-workspace.tar.gz
          archive: false
          if-no-files-found: error

  build:
    name: Build App
    needs: build-packages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-workspace
          path: .

      - name: 📦 Unpack package workspace
        run: tar -xzf package-workspace.tar.gz

      - name: 🏗️ Build app
        run: pnpm build:app

      - name: 📦 Pack app build
        run: tar -czf app-build.tar.gz packages/app/.output

      - name: 📤 Upload app build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-build
          path: app-build.tar.gz
          archive: false
          if-no-files-found: error

  build-docs:
    name: Build Documentation
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-workspace
          path: .

      - name: 📦 Unpack package workspace
        run: tar -xzf package-workspace.tar.gz

      - name: 🏗️ Build documentation
        run: pnpm build:docs

  lint:
    name: Lint
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-workspace
          path: .

      - name: 📦 Unpack package workspace
        run: tar -xzf package-workspace.tar.gz

      - name: 🔍 Lint
        run: pnpm lint

  format:
    name: Format
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📝 Format
        run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-workspace
          path: .

      - name: 📦 Unpack package workspace
        run: tar -xzf package-workspace.tar.gz

      - name: ✅ Typecheck
        run: pnpm typecheck

  coverage:
    name: Coverage
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📥 Download package workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-workspace
          path: .

      - name: 📦 Unpack package workspace
        run: tar -xzf package-workspace.tar.gz

      - name: 📥 Download app build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-build
          path: .

      - name: 📦 Unpack app build
        run: tar -xzf app-build.tar.gz

      - name: 🧪 Test
        run: pnpm coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: packages/app/coverage
          if-no-files-found: error
