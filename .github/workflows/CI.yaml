name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  ci:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 🏗️ Build
        run: pnpm build

      - name: 🔍 Lint
        run: pnpm lint

      - name: 📝 Format
        run: pnpm format:check

      - name: ✅ Typecheck
        run: pnpm typecheck

      - name: 🧪 Test
        run: pnpm test
