name: 🏗️ CI

on:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build app
        run: pnpm build:app

  coverage:
    name: Coverage
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
      # Shard the app suite (the CI long pole) across runners; package suites are small, so run them
      # Once on the first shard only rather than redundantly in every shard.
      - name: 🧪 Test (app)
        run: pnpm --filter @esposter/app run coverage -- --shard=${{ matrix.shard }}/4

      - name: 🧪 Test (packages)
        if: ${{ matrix.shard == 1 }}
        run: pnpm -r --parallel --aggregate-output --if-present --filter "!@esposter/app" run coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.shard }}
          path: packages/app/coverage
          if-no-files-found: error

  build-docs:
    name: Build Documentation
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build documentation
        run: pnpm build:docs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🔍 Lint
        run: pnpm lint

  format:
    name: Format
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📝 Format
        run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: ✅ Typecheck
        run: pnpm typecheck
