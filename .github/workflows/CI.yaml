name: 🏗️ CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i
      # Cache key = a content hash (mode + blob hash + path) of only the TRACKED files that actually feed
      # `pnpm build:packages` (ctix barrel gen + rolldown/vite bundle of each package's src/index.ts), plus the
      # root package.json (infra bundles it via `import packageJson from "../../../../package.json"`), the lockfile
      # and the catalog. This is an allowlist, not a denylist: every non-app package builds with the same fixed
      # stack, so the build inputs are a small, stable set and we enumerate them explicitly rather than hashing
      # everything and subtracting noise. Excluded by being absent from the allowlist: docs (README/CHANGELOG/
      # docs/**), lint config (.oxlintrc.json, eslint.config.js, eslint/**), test files + vitest.config.ts, test
      # fixtures (parse-tmx maps/, __snapshots__/), deploy/runtime config (host.json, Pulumi*.yaml,
      # drizzle.config.ts), and build-glue scripts (db-mock/scripts/** only copies a snapshot that already lives
      # in src/, so the script itself moves no untracked input) — none of which reach dist. Tracked files only, so
      # generated output (dist, ctix barrels, *.tsbuildinfo, node_modules) is excluded by construction. NOTE:
      # adding a build input of a new shape (e.g. a new root-level config a package's build reads) means adding
      # it to the allowlist below.
      #
      # Allowed per non-app package: package.json, rolldown.config.ts, vite.config.ts, auto-imports.d.ts (any vue
      # package's generated ambient imports), tsconfig*.json, src/** (minus *.test.ts/*.test-d.ts/*.bench.ts),
      # types/**; plus configuration/.ctirc-* (drives every package's barrel gen).
      - name: 🔑 Compute package build cache key
        id: key
        run: |
          hash=$( {
            git ls-tree -r HEAD packages | awk -F'\t' '
              $2 ~ /^packages\/app\// { next }
              $2 ~ /\.(test|test-d|bench)\.ts$/ { next }
              $2 ~ /^packages\/[^/]+\/(package\.json|rolldown\.config\.ts|vite\.config\.ts|auto-imports\.d\.ts)$/ { print; next }
              $2 ~ /^packages\/[^/]+\/tsconfig[^/]*\.json$/ { print; next }
              $2 ~ /^packages\/[^/]+\/(src|types)\// { print; next }
              $2 ~ /^packages\/configuration\/\.ctirc-/ { print; next }
            '
            git rev-parse HEAD:package.json HEAD:pnpm-lock.yaml HEAD:pnpm-workspace.yaml
          } | sha256sum | cut -d' ' -f1 )
          echo "hash=$hash" >> "$GITHUB_OUTPUT"
      # `packages/*/dist` is the published build output and `packages/*/src/**/index.ts` are the ctix-generated
      # Barrels (gitignored, absent on a fresh checkout). Both are produced by `pnpm build:packages`.
      - name: ♻️ Restore package builds
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            packages/*/dist
            packages/*/src/**/index.ts
          key: package-builds-${{ steps.key.outputs.hash }}

      - name: 🏗️ Build packages
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm build:packages
      # Single gated build, then fan the output out to every consuming job as one artifact (dist + barrels share
      # The `packages/` common ancestor, so consumers download into `packages`). No hidden-file flag needed —
      # Neither `dist` nor `index.ts` is a dotfile.
      - name: 📤 Upload package builds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-builds
          path: |
            packages/*/dist
            packages/*/src/**/index.ts
          if-no-files-found: error

  build:
    name: Build App
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build app
        run: pnpm build:app

  coverage:
    name: Coverage
    needs: build-packages
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages
      # `--shard=i/8` runs a distinct 1/8th of ALL test files (every package + scripts, via the root
      # Vitest `projects` config) on this runner; `--reporter=blob` serialises this shard's results and
      # Coverage data (vitest writes the per-shard `.vitest-reports/blob-i-8.json`) for the merge job.
      # `--reporter=blob` serialises this shard's results + coverage for the merge job. We pair it with
      # `--reporter=default` so failing tests / unhandled errors are also printed to the console — the
      # blob reporter alone writes only the file and prints nothing, hiding why a shard exits non-zero.
      - name: 🧪 Test
        run: pnpm exec vitest run --coverage --reporter=default --reporter=blob --shard=${{ matrix.shard }}/8

      - name: 📤 Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-blob-${{ matrix.shard }}
          path: .vitest-reports/*
          if-no-files-found: error
          include-hidden-files: true

  coverage-merge:
    name: Merge Coverage
    needs: [build-packages, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 📥 Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .vitest-reports
          pattern: coverage-blob-*
          merge-multiple: true
      # Recombine the sharded runs into one report with unified coverage from the blob data —
      # This re-emits the report only, it does not re-run any tests.
      - name: 🧪 Merge coverage
        run: pnpm exec vitest run --merge-reports --coverage

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage
          if-no-files-found: error

  build-docs:
    name: Build Documentation
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🏗️ Build documentation
        run: pnpm build:docs

  lint:
    name: Lint
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: 🔍 Lint
        run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Install dependencies
        run: pnpm i

      - name: 📝 Format
        run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Setup Project Dependencies
        uses: ./.github/actions/setup-project-dependencies

      - name: 📦 Setup Packages
        uses: ./.github/actions/setup-packages

      - name: ✅ Typecheck
        run: pnpm typecheck
